{% extends "game/base.html" %}
{% load static %}

{% block title %}Login | ArtGuessr{% endblock %}

{% block content %}
<section class="auth-card">
    <div class="auth-top-row">
        <h2 class="auth-title">Login</h2>
    </div>

    <form class="auth-form" method="POST" id="loginForm">
        {% csrf_token %}

        {% if error %}
            <div id="form-error-message" style="display:block;">{{ error }}</div>
        {% else %}
            <div id="form-error-message"></div>
        {% endif %}

        <div class="auth-field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username">
        </div>

        <div class="auth-field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password">
        </div>

        <div class="auth-field">
            <label for="role">Login as</label>
            <select id="role" name="role">
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <div class="auth-field" id="login-guid-field" style="display:none;">
            <label for="guid">University GUID (Required for Admin)</label>
            <input type="text" id="guid" name="guid" placeholder="Enter your university GUID">
        </div>

        <div class="auth-button-row">
            <button type="submit" class="auth-btn">Login</button>
        </div>
    </form>
</section>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/login.js' %}"></script>
{% endblock %}
