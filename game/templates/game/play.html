{% extends "game/base.html" %}

{% block title %}Play | ArtGuessr{% endblock %}
{% block nav %}
{% endblock %}

{% block content %}

<section class="play-card wireframe-play-card">

    <div class="play-top-row">
        <a href="{% url 'home' %}" class="home-icon-link">⌂</a>
        <div class="score-box">Score: 0 / 100</div>
    </div>

    <div class="play-image-wrapper">
        <div class="play-image-box">
            Artwork Image
        </div>
    </div>

    <form class="guess-form">

        <div class="guess-grid">
            <div class="guess-item">
                <label>Continent</label>
                <input type="text" placeholder="Answer here">
            </div>

            <div class="guess-item">
                <label>Year</label>
                <input type="text" placeholder="Answer here">
            </div>

            <div class="guess-item">
                <label>Country</label>
                <input type="text" placeholder="Answer here">
            </div>

            <div class="guess-item">
                <label>Artist</label>
                <input type="text" placeholder="Answer here">
            </div>
        </div>

        <div class="submit-row">
            <button type="submit" class="btn-main submit-btn-green">Submit</button>
        </div>

    </form>

</section>

{% endblock %}
